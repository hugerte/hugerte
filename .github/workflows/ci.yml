name: CI

on:
  push:
    branches: [ "release/**", "develop", "master" ]
  pull_request:
    branches: [ "release/**", "develop", "master" ]
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run headless tests (slow)"
        type: boolean
        default: false

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install

      - name: Build (TypeScript + oxide + hugerte JS)
        run: yarn ci

      - name: Lint
        run: yarn hugerte-grunt eslint

  headless-tests:
    name: Headless Tests
    runs-on: ubuntu-latest
    needs: build-and-lint
    permissions:
      contents: read
    # Run on pushes to main branches, or when manually triggered with run_tests=true
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.run_tests == true)
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install

      - name: Build
        run: yarn ci

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run headless tests
        run: yarn hugerte-grunt bedrock-auto:standard

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: modules/hugerte/scratch/TEST-*.xml
          if-no-files-found: ignore
